name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: harness checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harness_starter
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=12
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/harness_starter
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/harness_starter_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Create test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c 'CREATE DATABASE harness_starter_test;'
      - name: Apply migrations
        run: |
          npm run db:migrate
          npm run db:migrate:test
      - name: Structure check
        run: node scripts/check-structure.mjs
      - name: Docs check
        run: node scripts/check-docs.mjs
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test -- --run
      - name: Eval harness
        run: node evals/harness/run.mjs
      - name: Quality score (report only, not gating)
        run: node scripts/quality-score.mjs
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-reports
          path: |
            evals/reports/
            coverage/
          retention-days: 14
